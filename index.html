
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hola! – Lær Spansk Raskt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Primary palette */
            --primary:       #f97316;   /* orange-500 – energisk, inspirerende */
            --primary-dark:  #ea580c;   /* orange-600 */
            --primary-glow:  rgba(249,115,22,0.25);
            --secondary:     #38bdf8;   /* sky-400 – klar, tillitsfull */
            --secondary-glow: rgba(56,189,248,0.2);
            --accent:        #a78bfa;   /* violet-400 – kreativ */
            --success:       #4ade80;   /* green-400 – mestring */
            --success-glow:  rgba(74,222,128,0.2);
            --warning:       #fbbf24;   /* amber-400 */
            --danger:        #f87171;   /* red-400 */

            /* Backgrounds */
            --bg:            #0f172a;   /* slate-900 */
            --bg-surface:    #1e293b;   /* slate-800 */
            --bg-card:       #263248;   /* mellom slate-800 og 700 */
            --bg-hover:      #334155;   /* slate-700 */

            /* Text */
            --text:          #f1f5f9;   /* slate-100 */
            --text-muted:    #94a3b8;   /* slate-400 */
            --text-faint:    #475569;   /* slate-600 */

            /* Borders */
            --border:        rgba(255,255,255,0.07);
            --border-active: rgba(249,115,22,0.5);

            /* Legacy compat – keep existing components working */
            --cyan:          #38bdf8;
            --magenta:       #f97316;
            --lime:          #4ade80;
            --dark:          #0f172a;
            --dark-lighter:  #1e293b;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html { height: 100%; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        code, pre, .font-mono {
            font-family: 'Fira Code', 'Cascadia Code', monospace;
        }

        /* ─── Glassmorphism card (kept for backwards compat) ─── */
        .glass-panel {
            background: rgba(30,41,59,0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
        }

        /* ─── Modern card ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            border-color: rgba(249,115,22,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(-1px);
        }

        /* ─── App background with subtle gradients ─── */
        .app-bg {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(249,115,22,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(56,189,248,0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        /* ─── Button styles ─── */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--primary-glow);
            font-family: 'Inter', sans-serif;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px var(--primary-glow);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(56,189,248,0.12);
            color: var(--secondary);
            font-weight: 600;
            border-radius: 14px;
            border: 1px solid rgba(56,189,248,0.25);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-secondary:hover {
            background: rgba(56,189,248,0.2);
            border-color: rgba(56,189,248,0.5);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }

        /* ─── Inputs ─── */
        .app-input {
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 16px; /* prevent zoom on iOS */
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .app-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .app-input::placeholder { color: var(--text-faint); }

        /* ─── Bottom navigation ─── */
        .bottom-nav {
            background: rgba(15,23,42,0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }

        /* ─── Progress bars ─── */
        .progress-track {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 100px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-fill-success {
            background: linear-gradient(90deg, var(--success), #22c55e);
        }

        /* ─── XP / streak pill ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .badge-primary { background: rgba(249,115,22,0.15); color: #fb923c; }
        .badge-secondary { background: rgba(56,189,248,0.12); color: #7dd3fc; }
        .badge-success { background: rgba(74,222,128,0.12); color: #86efac; }
        .badge-accent { background: rgba(167,139,250,0.12); color: #c4b5fd; }

        /* ─── Legacy neon classes (kept for backwards compat) ─── */
        .neon-border-cyan {
            border: 1px solid var(--secondary);
            box-shadow: 0 0 12px var(--secondary-glow);
        }
        .neon-border-magenta {
            border: 1px solid var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }
        .neon-text-cyan { color: var(--secondary); }
        .neon-text-magenta { color: var(--primary); }
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(56,189,248,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56,189,248,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ─── Animations ─── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes flame {
            0%,100% { transform: scaleY(1) scaleX(1) rotate(-2deg); }
            33%      { transform: scaleY(1.08) scaleX(0.95) rotate(2deg); }
            66%      { transform: scaleY(0.96) scaleX(1.04) rotate(-1deg); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--primary-glow); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px transparent; }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 transparent; }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-fadeInUp   { animation: fadeInUp 0.5s ease both; }
        .animate-fadeIn     { animation: fadeIn 0.4s ease both; }
        .animate-scaleIn    { animation: scaleIn 0.35s ease both; }
        .animate-slideUp    { animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1) both; }
        .animate-popIn      { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
        .animate-float      { animation: float 3s ease-in-out infinite; }
        .animate-flame      { animation: flame 1.4s ease-in-out infinite; }
        .animate-spin       { animation: spin 0.8s linear infinite; }
        .animate-pulse-ring { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }

        .shimmer {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.07) 50%,
                rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        /* stagger delays */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ─── Safe area ─── */
        .pb-safe { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

        /* ─── NeonButton legacy ─── */
        .btn-neon-cyan {
            background: rgba(56,189,248,0.1);
            border: 1px solid rgba(56,189,248,0.4);
            color: #38bdf8;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-neon-cyan:hover {
            background: rgba(56,189,248,0.18);
            box-shadow: 0 0 16px var(--secondary-glow);
        }
        .btn-neon-magenta {
            background: rgba(249,115,22,0.1);
            border: 1px solid rgba(249,115,22,0.4);
            color: #f97316;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-neon-magenta:hover {
            background: rgba(249,115,22,0.18);
            box-shadow: 0 0 16px var(--primary-glow);
        }

        /* ─── Gradient text ─── */
        .text-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-success {
            background: linear-gradient(135deg, var(--success) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── Selected/active pill tabs ─── */
        .tab-active {
            background: rgba(249,115,22,0.12);
            color: var(--primary);
            border-color: rgba(249,115,22,0.35);
        }

        /* ─── Custom checkbox ─── */
        input[type="checkbox"] { accent-color: var(--primary); }

        /* ─── Tooltip ─── */
        .tooltip {
            position: relative;
        }
        .tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-hover);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid var(--border);
        }
        .tooltip:hover::after { opacity: 1; }

        /* ─── Modal overlay ─── */
        .modal-overlay {
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* ─── Conversation chat ─── */
        .msg-user {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        .msg-ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 18px 18px 18px 4px;
        }

        /* ─── Achievement card ─── */
        .achievement-unlocked {
            border-color: rgba(251,191,36,0.4);
            background: rgba(251,191,36,0.06);
        }
        .achievement-locked {
            opacity: 0.4;
            filter: grayscale(0.6);
        }

        /* ─── Custom focus ring ─── */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ─── Highlight on select ─── */
        ::selection {
            background: rgba(249,115,22,0.3);
            color: white;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:      '#f97316',
                        'primary-dark':'#ea580c',
                        secondary:    '#38bdf8',
                        accent:       '#a78bfa',
                        success:      '#4ade80',
                        warning:      '#fbbf24',
                        danger:       '#f87171',
                        // legacy compat
                        cyan:         '#38bdf8',
                        magenta:      '#f97316',
                        lime:         '#4ade80',
                        dark:         '#0f172a',
                        'dark-lighter':'#1e293b',
                    },
                    fontFamily: {
                        heading: ['Inter', 'system-ui', 'sans-serif'],
                        body:    ['Inter', 'system-ui', 'sans-serif'],
                        mono:    ['Fira Code', 'Cascadia Code', 'monospace'],
                    },
                    borderRadius: {
                        xl2: '1rem',
                        xl3: '1.5rem',
                    }
                }
            }
        }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react/":      "https://esm.sh/react@^19.2.3/",
        "react":       "https://esm.sh/react@^19.2.3",
        "react-dom/":  "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
</head>
<body class="app-bg">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
